<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sekme Yöneticisi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    h1 {
      color: white;
      font-size: 24px;
      margin-bottom: 20px;
      text-align: center;
    }

    .create-group {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }

    .create-group h2 {
      font-size: 16px;
      margin-bottom: 10px;
      color: #667eea;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
    }

    input {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
    }

    .color-picker {
      display: flex;
      gap: 8px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .color-option {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      cursor: pointer;
      border: 3px solid transparent;
      transition: transform 0.2s, border-color 0.2s;
    }

    .color-option:hover {
      transform: scale(1.1);
    }

    .color-option.selected {
      border-color: #333;
      transform: scale(1.15);
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .groups-list {
      background: white;
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-height: 300px;
      overflow-y: auto;
    }

    .groups-list h2 {
      font-size: 16px;
      margin-bottom: 12px;
      color: #667eea;
    }

    .group-item {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s;
    }

    .group-item:hover {
      background: #e9ecef;
      transform: translateX(5px);
    }

    .group-color {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .group-info {
      flex: 1;
    }

    .group-name {
      font-weight: 600;
      margin-bottom: 2px;
    }

    .group-count {
      font-size: 12px;
      color: #666;
    }

    .group-actions {
      display: flex;
      gap: 5px;
    }

    .btn-small {
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 6px;
      background: #dc3545;
      color: white;
      border: none;
      cursor: pointer;
    }

    .btn-suspend {
      background: #ffc107;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #999;
    }

    .stats {
      background: rgba(255,255,255,0.2);
      padding: 10px;
      border-radius: 8px;
      margin-bottom: 15px;
      color: white;
      text-align: center;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🗂️ Sekme Yöneticisi</h1>
    
    <div class="stats">
      <div>Açık Sekmeler: <strong id="tabCount">0</strong></div>
      <div>Aktif Gruplar: <strong id="groupCount">0</strong></div>
    </div>

    <div class="create-group">
      <h2>Yeni Grup Oluştur</h2>
      <div class="input-group">
        <input type="text" id="groupName" placeholder="Grup adı (örn: Eğlence)" />
      </div>
      <div class="color-picker" id="colorPicker">
        <div class="color-option" data-color="grey" style="background: #5f6368"></div>
        <div class="color-option" data-color="blue" style="background: #1a73e8"></div>
        <div class="color-option" data-color="red" style="background: #d93025"></div>
        <div class="color-option" data-color="yellow" style="background: #f9ab00"></div>
        <div class="color-option" data-color="green" style="background: #188038"></div>
        <div class="color-option" data-color="pink" style="background: #d01884"></div>
        <div class="color-option" data-color="purple" style="background: #9334e6"></div>
        <div class="color-option" data-color="cyan" style="background: #007b83"></div>
      </div>
      <button class="btn-primary" id="createGroup">Seçili Sekmeleri Grupla</button>
    </div>

    <div class="groups-list">
      <h2>Gruplarım</h2>
      <div id="groupsList"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
